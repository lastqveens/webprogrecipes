<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  
  <title>Delicious Recipes</title>
  
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Main site navigation -->
  <nav>
    <!-- Link to home page, recipes list, and contact page -->
    <a href="index.html">Home</a>
    
    <a href="recipes.html">Recipes</a>
    
    <a href="contact.html">Contact</a>
  </nav>

  <!-- Site header with main headline and tagline -->
  <header>
    <h1>Welcome to Delicious Recipes</h1>
    <p>Simple recipes anyone can cook</p>
  </header>

  <!-- Primary content container; used to center or limit width via CSS -->
  <div class="container">

    <h2>Featured Recipes</h2>
    <div class="grid">

      <!-- Single flip-card: front shows an image, back shows details -->
      <div class="flip-card">
        <div class="flip-inner">

          <!-- Front face of the card (visible by default) -->
          <div class="flip-front">
            
            <img src="Assets/Images/pasta.jpg" alt="Creamy Pasta">
          </div>

          <!-- Back face of the card (revealed when flipped) -->
          <div class="flip-back">
            <h3>Creamy Pasta</h3>
            <p>Rich and creamy pasta dish</p>
          </div>

        </div>
      </div>

      <!-- Second flip-card (Pancakes) -->
      <div class="flip-card">
        <div class="flip-inner">

          <div class="flip-front">
            <img src="Assets/Images/pancakes.jpeg" alt="Pancakes">
          </div>

          <div class="flip-back">
            <h3>Pancakes</h3>
            <p>Favorite fluffy breakfast</p>
          </div>

        </div>
      </div>

      <!-- Third flip-card (Salad) -->
      <div class="flip-card">
        <div class="flip-inner">

          <div class="flip-front">
            <img src="Assets/Images/salad.webp" alt="Fresh Salad">
          </div>

          <div class="flip-back">
            <!-- Keep titles concise to avoid layout issues; consider moving long ingredient lists to a details page -->
            <h3>Fresh Salad</h3>
            <p>Toss all ingredients and use dressing of your choice</p>
          </div>

        </div>
      </div>

    </div> 

  </div> 

  
  <footer>
    <p>© 2026 Recipes4U</p>
  </footer>

</body>
</html>
